      /* Scan page: attempts to access camera and shows a simple scanner UI (mock) */
      const ScanPage = ({ onBack }) => {
        const videoRef = React.useRef(null);
        const [streaming, setStreaming] = useState(false);
        const [scanned, setScanned] = useState(null);

        useEffect(() => {
          let stream;
          const start = async () => {
            try {
              stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });

                videoRef.current.srcObject = stream;
                await videoRef.current.play();
                setStreaming(true);
              }
            } catch (e) {
              setStreaming(false);
            }
          };
          start();

          return () => {
            if (stream) {
              stream.getTracks().forEach(t => t.stop());
            }
          };
        }, []);

          setScanned('QR:accessbank://pay?ref=12345');
        };

        const qrValue = 'accessbank://pay?ref=12345';
        const [qrSrc, setQrSrc] = useState(null);

            try {

              } else if (window.QRCode && window.QRCode.toDataURL) {
                window.QRCode.toDataURL(qrValue, { width: 220 }, (err, url) => { if (!err) setQrSrc(url); });

            React.createElement('div', { className: 'w-full h-64 bg-black flex items-center justify-center mb-4' },
